<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Piston Club | Trail Garage Status</title>
  <style>
    :root{
      --bg:#131517;
      --panel:#1d2124;
      --panel-2:#252a2e;
      --line:#3b434a;
      --gold:#d0a24e;
      --text:#f5f1e8;
      --muted:#b8b1a2;
      --open:#58d28d;
      --closed:#ff7b7b;
      --unknown:#ffcf6a;
      --shadow:0 20px 50px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(208,162,78,.12), transparent 30%),
        linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.62)),
        repeating-linear-gradient(
          135deg,
          #14181a 0px,
          #14181a 18px,
          #171c1f 18px,
          #171c1f 36px
        );
      min-height:100vh;
    }

    .wrap{
      max-width:1240px;
      margin:0 auto;
      padding:36px 20px 60px;
    }

    .hero{
      background:
        linear-gradient(180deg, rgba(208,162,78,.09), rgba(208,162,78,0)),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:30px;
      box-shadow:var(--shadow);
      margin-bottom:24px;
      position:relative;
      overflow:hidden;
    }

    .hero:before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.35;
      background:
        linear-gradient(90deg, transparent 0 3%, rgba(208,162,78,.12) 3% 3.3%, transparent 3.3% 100%),
        linear-gradient(0deg, transparent 0 94%, rgba(208,162,78,.10) 94% 95%, transparent 95% 100%);
    }

    .eyebrow{
      margin:0 0 10px;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:12px;
      position:relative;
      z-index:1;
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(30px, 4vw, 54px);
      line-height:1.02;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.05em;
      position:relative;
      z-index:1;
    }

    .sub{
      margin:0;
      color:var(--muted);
      max-width:860px;
      line-height:1.5;
      position:relative;
      z-index:1;
    }

    .layout{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:22px;
    }

    @media (max-width: 960px){
      .layout{grid-template-columns:1fr}
    }

    .card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .card-head{
      padding:20px 22px 16px;
      display:flex;
      justify-content:space-between;
      gap:18px;
      align-items:flex-start;
      background:
        linear-gradient(180deg, rgba(208,162,78,.12), rgba(208,162,78,0)),
        var(--panel-2);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .label{
      display:inline-block;
      margin-bottom:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      background:rgba(255,255,255,.04);
    }

    .venue-title{
      margin:0;
      font-size:28px;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.04em;
      line-height:1.05;
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
      border-radius:999px;
      padding:10px 14px;
      font-weight:700;
      font-size:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
    }

    .status.open{color:var(--open)}
    .status.closed{color:var(--closed)}
    .status.unknown{color:var(--unknown)}

    .content{
      padding:22px;
    }

    .loading,
    .error{
      padding:16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      line-height:1.5;
    }

    .error{
      color:#ffb0b0;
      border-color:rgba(255,123,123,.28);
      background:rgba(255,123,123,.06);
    }

    .section{
      margin-bottom:18px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:16px;
      background:rgba(255,255,255,.025);
    }

    .section:last-child{margin-bottom:0}

    .section-title{
      margin:0 0 10px;
      font-size:12px;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.16em;
    }

    .section-body{
      margin:0;
      color:var(--text);
      line-height:1.55;
      font-size:15px;
    }

    .hours{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      gap:10px;
    }

    .hours li{
      display:flex;
      justify-content:space-between;
      gap:18px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.06);
      background:rgba(255,255,255,.03);
      align-items:flex-start;
    }

    .day{
      min-width:110px;
      color:var(--gold);
      font-weight:700;
    }

    .time{
      text-align:right;
      flex:1;
    }

    .food{
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:12px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:var(--text);
      padding:12px 16px;
      border-radius:12px;
      border:1px solid rgba(208,162,78,.35);
      background:rgba(208,162,78,.08);
      font-weight:700;
    }

    .btn:hover{
      background:rgba(208,162,78,.14);
    }

    .map-card{
      min-height:660px;
    }

    .map-frame{
      width:100%;
      height:100%;
      min-height:660px;
      border:0;
      display:block;
      background:#101214;
    }

    footer{
      margin-top:20px;
      text-align:center;
      color:#978f81;
      font-size:12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <p class="eyebrow">Trail Garage Status</p>
      <h1>The Piston Club</h1>
      <p class="sub">
        Live venue panel pulling the public opening-times and footer contact information directly from the Piston Club homepage text.
      </p>
    </section>

    <section class="layout">
      <article class="card">
        <div class="card-head">
          <div>
            <span class="label">Engine Garage</span>
            <h2 class="venue-title" id="venueName">The Piston Club</h2>
          </div>
          <div class="status unknown" id="statusBadge">Checking…</div>
        </div>

        <div class="content" id="contentArea">
          <div class="loading">Loading live website details…</div>
        </div>
      </article>

      <aside class="card map-card">
        <iframe
          id="mapFrame"
          class="map-frame"
          title="The Piston Club map"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="about:blank"
        ></iframe>
      </aside>
    </section>

    <footer>
      Live page source: thepistonclub.co.uk
    </footer>
  </div>

  <script>
    const SOURCE_URL = "https://thepistonclub.co.uk/";
    const FETCH_URL = "https://r.jina.ai/http://thepistonclub.co.uk/";
    const contentArea = document.getElementById("contentArea");
    const statusBadge = document.getElementById("statusBadge");
    const venueName = document.getElementById("venueName");
    const mapFrame = document.getElementById("mapFrame");

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normaliseSpaces(str = "") {
      return str.replace(/\u00A0/g, " ").replace(/[ \t]+/g, " ").trim();
    }

    function parsePistonClubText(text) {
      const cleaned = text.replace(/\r/g, "");

      const openingBlockMatch = cleaned.match(
        /Opening Times[\s\S]*?Monday to Saturday:\s*([^\n]+)\n\((Food[^\n]+)\)[\s\S]*?Sunday:\s*([^\n]+)\n\((Food[^\n]+)\)/i
      );

      let monSat = "";
      let monSatFood = "";
      let sunday = "";
      let sundayFood = "";

      if (openingBlockMatch) {
        monSat = normaliseSpaces(openingBlockMatch[1]);
        monSatFood = normaliseSpaces(openingBlockMatch[2]);
        sunday = normaliseSpaces(openingBlockMatch[3]);
        sundayFood = normaliseSpaces(openingBlockMatch[4]);
      } else {
        const mondayMatch = cleaned.match(/Monday to Saturday:\s*([^\n]+)/i);
        const mondayFoodMatch = cleaned.match(/Monday to Saturday:[^\n]*\n\((Food[^\n]+)\)/i);
        const sundayMatch = cleaned.match(/Sunday:\s*([^\n]+)/i);
        const sundayFoodMatch = cleaned.match(/Sunday:[^\n]*\n\((Food[^\n]+)\)/i);

        monSat = mondayMatch ? normaliseSpaces(mondayMatch[1]) : "";
        monSatFood = mondayFoodMatch ? normaliseSpaces(mondayFoodMatch[1]) : "";
        sunday = sundayMatch ? normaliseSpaces(sundayMatch[1]) : "";
        sundayFood = sundayFoodMatch ? normaliseSpaces(sundayFoodMatch[1]) : "";
      }

      const footerMatch = cleaned.match(
        /\* The Piston Club\s*\n@\s*The Stag\s*\n([^\n]+)\n([^\n]+)\n([^\n]+)\n([^\n]+)\n([^\n]+)\s*\n\s*\*\s*([0-9 ]+)\s*\n\s*\*\s*([^\n]+)/i
      );

      let addressLines = [
        "@ The Stag",
        "Alcester Road",
        "Redhill",
        "Stratford upon Avon",
        "Warwickshire",
        "B49 6NQ"
      ];
      let phone = "01789 764634";
      let email = "info@thepistonclub.co.uk";

      if (footerMatch) {
        addressLines = [
          "@ The Stag",
          normaliseSpaces(footerMatch[1]),
          normaliseSpaces(footerMatch[2]),
          normaliseSpaces(footerMatch[3]),
          normaliseSpaces(footerMatch[4]),
          normaliseSpaces(footerMatch[5])
        ];
        phone = normaliseSpaces(footerMatch[6]);
        email = normaliseSpaces(footerMatch[7]);
      }

      return {
        name: "The Piston Club",
        addressLines,
        phone,
        email,
        website: SOURCE_URL,
        hours: {
          monSat,
          monSatFood,
          sunday,
          sundayFood
        }
      };
    }

    function todayHours(data) {
      const now = new Date();
      const ukDay = now.toLocaleString("en-GB", {
        weekday: "long",
        timeZone: "Europe/London"
      });

      if (ukDay === "Sunday") {
        return {
          label: "Sunday",
          venue: data.hours.sunday,
          food: data.hours.sundayFood
        };
      }

      return {
        label: "Today",
        venue: data.hours.monSat,
        food: data.hours.monSatFood
      };
    }

    function parseTimeRange(range) {
      if (!range) return null;
      const cleaned = range
        .replace(/[–—]/g, "-")
        .replace(/\s+/g, "")
        .toLowerCase();

      const parts = cleaned.split("-");
      if (parts.length !== 2) return null;

      function toMinutes(value) {
        const match = value.match(/^(\d{1,2})(?:\.(\d{2}))?(am|pm)$/);
        if (!match) return null;
        let hour = parseInt(match[1], 10);
        const mins = parseInt(match[2] || "0", 10);
        const meridian = match[3];

        if (meridian === "am") {
          if (hour === 12) hour = 0;
        } else {
          if (hour !== 12) hour += 12;
        }

        return hour * 60 + mins;
      }

      const start = toMinutes(parts[0]);
      const end = toMinutes(parts[1]);
      if (start == null || end == null) return null;

      return { start, end };
    }

    function computeOpenStatus(data) {
      const now = new Date();
      const uk = new Intl.DateTimeFormat("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        weekday: "long",
        timeZone: "Europe/London"
      }).formatToParts(now);

      const hour = parseInt(uk.find(p => p.type === "hour")?.value || "0", 10);
      const minute = parseInt(uk.find(p => p.type === "minute")?.value || "0", 10);
      const weekday = uk.find(p => p.type === "weekday")?.value || "";
      const minsNow = hour * 60 + minute;

      const venueRange = weekday === "Sunday"
        ? parseTimeRange(data.hours.sunday)
        : parseTimeRange(data.hours.monSat);

      const foodRange = weekday === "Sunday"
        ? parseTimeRange((data.hours.sundayFood || "").replace(/^Food:\s*/i, ""))
        : parseTimeRange((data.hours.monSatFood || "").replace(/^Food\s*/i, "").replace(/^:\s*/, ""));

      const venueOpen = venueRange ? minsNow >= venueRange.start && minsNow <= venueRange.end : null;
      const foodOpen = foodRange ? minsNow >= foodRange.start && minsNow <= foodRange.end : null;

      return { venueOpen, foodOpen };
    }

    function renderMap(addressLines) {
      const query = encodeURIComponent(["The Piston Club", ...addressLines].join(", "));
      mapFrame.src = `https://www.openstreetmap.org/export/embed.html?bbox=-1.82%2C52.18%2C-1.62%2C52.30&layer=mapnik&marker=52.219%2C-1.725`;
      mapFrame.dataset.link = `https://www.google.com/maps/search/?api=1&query=${query}`;
    }

    function render(data) {
      const current = todayHours(data);
      const status = computeOpenStatus(data);
      const addressHtml = data.addressLines.map(line => escapeHtml(line)).join("<br>");

      venueName.textContent = data.name;

      if (status.venueOpen === true) {
        statusBadge.className = "status open";
        statusBadge.textContent = "Open now";
      } else if (status.venueOpen === false) {
        statusBadge.className = "status closed";
        statusBadge.textContent = "Closed now";
      } else {
        statusBadge.className = "status unknown";
        statusBadge.textContent = "Status unavailable";
      }

      renderMap(data.addressLines);

      contentArea.innerHTML = `
        <div class="section">
          <p class="section-title">Current Status</p>
          <p class="section-body">
            <strong>${escapeHtml(current.label)}:</strong> ${escapeHtml(current.venue || "Unavailable")}
            ${current.food ? `<br><span style="color:var(--muted)">Food: ${escapeHtml(current.food.replace(/^Food:?\s*/i, ""))}</span>` : ""}
            ${status.foodOpen === true ? `<br><span style="color:var(--open)">Food service appears open now.</span>` : ""}
            ${status.foodOpen === false ? `<br><span style="color:var(--closed)">Food service appears closed now.</span>` : ""}
          </p>
        </div>

        <div class="section">
          <p class="section-title">Opening Hours</p>
          <ul class="hours">
            <li>
              <span class="day">Mon to Sat</span>
              <span class="time">
                ${escapeHtml(data.hours.monSat || "Unavailable")}
                ${data.hours.monSatFood ? `<span class="food">${escapeHtml(data.hours.monSatFood)}</span>` : ""}
              </span>
            </li>
            <li>
              <span class="day">Sunday</span>
              <span class="time">
                ${escapeHtml(data.hours.sunday || "Unavailable")}
                ${data.hours.sundayFood ? `<span class="food">${escapeHtml(data.hours.sundayFood)}</span>` : ""}
              </span>
            </li>
          </ul>
        </div>

        <div class="section">
          <p class="section-title">Location</p>
          <p class="section-body">${addressHtml}</p>
        </div>

        <div class="section">
          <p class="section-title">Contact</p>
          <p class="section-body">
            ${escapeHtml(data.phone)}<br>
            <a href="mailto:${escapeHtml(data.email)}" style="color:var(--gold); text-decoration:none;">${escapeHtml(data.email)}</a>
          </p>
          <div class="actions">
            <a class="btn" href="${escapeHtml(data.website)}" target="_blank" rel="noopener noreferrer">Venue Website</a>
            <a class="btn" href="${escapeHtml(mapFrame.dataset.link)}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a>
          </div>
        </div>
      `;
    }

    async function loadLiveData() {
      try {
        const res = await fetch(FETCH_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();

        const parsed = parsePistonClubText(text);

        if (!parsed.hours.monSat && !parsed.hours.sunday) {
          throw new Error("Opening hours not found on source page.");
        }

        localStorage.setItem("pistonClubLiveData", JSON.stringify(parsed));
        render(parsed);
      } catch (err) {
        const cached = localStorage.getItem("pistonClubLiveData");
        if (cached) {
          render(JSON.parse(cached));
          statusBadge.className = "status unknown";
          statusBadge.textContent = "Showing cached data";
        } else {
          contentArea.innerHTML = `
            <div class="error">
              Failed to load the live website data.
            </div>
          `;
          statusBadge.className = "status unknown";
          statusBadge.textContent = "Unavailable";
        }
      }
    }

    loadLiveData();
  </script>
</body>
</html>
