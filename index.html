<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trail Garage Status</title>

  <style>
    :root{
      --panel:#1c2023;
      --panel-2:#262c30;
      --line:#40484f;
      --gold:#d3a44d;
      --gold-soft:rgba(211,164,77,.14);
      --text:#f5f1e8;
      --muted:#b8b1a2;
      --open:#56d58a;
      --closed:#ff7d7d;
      --unknown:#f0c76d;
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
      min-height:100vh;
      background:
        radial-gradient(circle at top right, rgba(211,164,77,.12), transparent 28%),
        radial-gradient(circle at bottom left, rgba(211,164,77,.06), transparent 22%),
        linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.62)),
        repeating-linear-gradient(
          135deg,
          #121618 0px,
          #121618 18px,
          #171b1e 18px,
          #171b1e 36px
        );
    }

    .wrap{
      max-width:1320px;
      margin:0 auto;
      padding:34px 20px 60px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      margin-bottom:24px;
      padding:34px 30px;
      border-radius:28px;
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(211,164,77,.12), rgba(211,164,77,0)),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--panel);
      box-shadow:var(--shadow);
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.35;
      background:
        linear-gradient(90deg, transparent 0 3%, rgba(211,164,77,.14) 3% 3.3%, transparent 3.3% 100%),
        linear-gradient(0deg, transparent 0 93%, rgba(211,164,77,.10) 93% 94%, transparent 94% 100%);
    }

    .eyebrow{
      position:relative;
      z-index:1;
      margin:0 0 10px;
      color:var(--gold);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.18em;
    }

    h1{
      position:relative;
      z-index:1;
      margin:0 0 10px;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.05em;
      font-size:clamp(30px,4vw,56px);
      line-height:1.02;
    }

    .sub{
      position:relative;
      z-index:1;
      margin:0;
      color:var(--muted);
      max-width:980px;
      line-height:1.55;
      font-size:16px;
    }

    .cards{
      display:grid;
      gap:24px;
    }

    .card{
      overflow:hidden;
      border-radius:var(--radius);
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--panel);
      box-shadow:var(--shadow);
    }

    .card-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      padding:22px 22px 16px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(211,164,77,.12), rgba(211,164,77,0)),
        var(--panel-2);
    }

    .label{
      display:inline-block;
      margin-bottom:8px;
      padding:7px 11px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:12px;
    }

    .venue-title{
      margin:0;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.04em;
      line-height:1.05;
      font-size:28px;
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:9px;
      white-space:nowrap;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      font-weight:700;
      font-size:14px;
    }

    .status.open{color:var(--open)}
    .status.closed{color:var(--closed)}
    .status.unknown{color:var(--unknown)}

    .content{
      padding:22px;
    }

    .venue-layout{
      display:grid;
      grid-template-columns:1fr 460px;
      gap:22px;
      align-items:center;
    }

    @media (max-width: 1100px){
      .venue-layout{
        grid-template-columns:1fr;
      }
    }

    .info-column{
      min-width:0;
    }

    .map-column{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100%;
    }

    .map-frame-wrap{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:640px;
    }

    .map-frame{
      width:100%;
      height:640px;
      border:0;
      display:block;
      background:#101214;
      border-radius:18px;
      overflow:hidden;
    }

    .section{
      margin-bottom:18px;
      padding:16px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.025);
    }

    .section:last-child{margin-bottom:0}

    .section-title{
      margin:0 0 10px;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.16em;
      font-size:12px;
    }

    .section-body{
      margin:0;
      color:var(--text);
      font-size:15px;
      line-height:1.6;
    }

    .hours{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      gap:10px;
    }

    .hours li{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.06);
      background:rgba(255,255,255,.03);
    }

    .day{
      min-width:110px;
      color:var(--gold);
      font-weight:700;
    }

    .time{
      flex:1;
      text-align:right;
    }

    .food{
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:12px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 16px;
      border-radius:12px;
      text-decoration:none;
      font-weight:700;
      color:var(--text);
      border:1px solid rgba(211,164,77,.35);
      background:var(--gold-soft);
      transition:.15s ease;
    }

    .btn:hover{
      background:rgba(211,164,77,.2);
      transform:translateY(-1px);
    }
  </style>
</head>

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function toSlug(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, "-");
    }

    function parseTimeRange(range) {
      if (!range) return null;

      const cleaned = String(range)
        .replace(/^food:?\s*/i, "")
        .replace(/[–—]/g, "-")
        .replace(/\s+/g, "")
        .toLowerCase();

      if (/closed|unavailable|see social media|see facebook/i.test(cleaned)) return null;

      const parts = cleaned.split("-");
      if (parts.length !== 2) return null;

      function toMinutes(value) {
        const match =
          value.match(/^(\d{1,2})(?::|\.)(\d{2})(am|pm)$/) ||
          value.match(/^(\d{1,2})(am|pm)$/);

        if (!match) return null;

        let hour;
        let mins;
        let meridian;

        if (match.length === 4) {
          hour = parseInt(match[1], 10);
          mins = parseInt(match[2], 10);
          meridian = match[3];
        } else {
          hour = parseInt(match[1], 10);
          mins = 0;
          meridian = match[2];
        }

        if (meridian === "am") {
          if (hour === 12) hour = 0;
        } else {
          if (hour !== 12) hour += 12;
        }

        return hour * 60 + mins;
      }

      const start = toMinutes(parts[0]);
      const end = toMinutes(parts[1]);

      if (start == null || end == null) return null;
      return { start, end };
    }

    function computeOpenStatusFromWeek(hoursArray) {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        weekday: "long",
        hour12: false,
        timeZone: "Europe/London"
      }).formatToParts(now);

      const hour = parseInt(parts.find(p => p.type === "hour")?.value || "0", 10);
      const minute = parseInt(parts.find(p => p.type === "minute")?.value || "0", 10);
      const weekday = parts.find(p => p.type === "weekday")?.value || "";
      const minsNow = hour * 60 + minute;

      const today = (hoursArray || []).find(h => (h.day || "").toLowerCase() === weekday.toLowerCase());

      if (!today) {
        return {
          venueOpen: null,
          foodOpen: null,
          label: "Today",
          venue: "Unavailable",
          extra: ""
        };
      }

      if (/closed/i.test(today.time || "")) {
        return {
          venueOpen: false,
          foodOpen: false,
          label: "Today",
          venue: today.time || "Closed",
          extra: today.extra || ""
        };
      }

      const venueRange = parseTimeRange(today.time);
      const extraRange = today.extra ? parseTimeRange(today.extra) : null;

      return {
        venueOpen: venueRange ? minsNow >= venueRange.start && minsNow <= venueRange.end : null,
        foodOpen: extraRange ? minsNow >= extraRange.start && minsNow <= extraRange.end : null,
        label: "Today",
        venue: today.time || "Unavailable",
        extra: today.extra || ""
      };
    }

            `).join("")}
          </ul>
        </div>
      `;
    }

      const statusBadge = document.getElementById(`statusBadge-${slug}`);
      const venueName = document.getElementById(`venueName-${slug}`);

      const status = computeOpenStatusFromWeek(data.hours);
      const addressHtml = (data.addressLines || [data.name]).map(line => escapeHtml(line)).join("<br>");
      const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(data.mapsQuery)}`;

      venueName.textContent = data.name;

      if (status.venueOpen === true) {
        statusBadge.className = "status open";
        statusBadge.textContent = "Open now";
      } else if (status.venueOpen === false) {
        statusBadge.className = "status closed";
        statusBadge.textContent = "Closed now";
      } else {
        statusBadge.className = "status unknown";
        statusBadge.textContent = "Status unavailable";
      }

      const socialButtons = [];
      if (data.socials?.facebook) {
        socialButtons.push(`<a class="btn" href="${escapeHtml(data.socials.facebook)}" target="_blank" rel="noopener noreferrer">Facebook</a>`);

      if (data.socials?.instagram) {

      }

      contentArea.innerHTML = `
        <div class="section">
          <p class="section-title">Current Status</p>
          <p class="section-body">
            <strong>${
              status.venueOpen === true ? "Venue is currently open." :
              status.venueOpen === false ? "Venue is currently closed." :
              "Live open/closed status could not be confirmed."
            }</strong>
            <br>
            ${escapeHtml(status.label)} hours: ${escapeHtml(status.venue || "Unavailable")}
            ${status.extra ? `<br><span style="color:var(--muted)">${escapeHtml(status.extra)}</span>` : ""}
            ${
              status.foodOpen === true
                ? `<br><span style="color:var(--open)">Food service appears to be open now.</span>`
                : status.foodOpen === false && status.extra
                  ? `<br><span style="color:var(--muted)">Food service appears to be closed now.</span>`
                  : ""
            }
          </p>
        </div>

        ${renderHoursList(data.hours)}

        <div class="section">
          <p class="section-title">Location</p>
          <p class="section-body">${addressHtml}</p>
        </div>

        <div class="section">
          <p class="section-title">Contact</p>
          <p class="section-body">
            ${data.phone ? `${escapeHtml(data.phone)}<br>` : ""}
            ${data.email
              ? `<a href="mailto:${escapeHtml(data.email)}" style="color:var(--gold); text-decoration:none;">${escapeHtml(data.email)}</a>`
              : "See venue website or social media"}
          </p>
          <div class="actions">
            <a class="btn" href="${escapeHtml(data.website)}" target="_blank" rel="noopener noreferrer">Venue Website</a>
            <a class="btn" href="${escapeHtml(mapsLink)}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a>
            ${socialButtons.join("")}
          </div>
        </div>
      `;

      renderMap(data);
    }

    function init() {
      VENUES.forEach(renderVenue);
    }

    init();
  </script>
</body>
</html>
