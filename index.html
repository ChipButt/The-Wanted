<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trail Garage Status</title>
  <style>
    :root{
      --bg:#1a1d1f;
      --panel:#24282b;
      --panel-2:#2c3135;
      --line:#5d6670;
      --gold:#d6a84f;
      --text:#f4f1ea;
      --muted:#b9b3a6;
      --good:#59d38a;
      --bad:#ff7a7a;
      --warn:#ffcc66;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(214,168,79,.12), transparent 30%),
        linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.65)),
        repeating-linear-gradient(
          135deg,
          #1b1e20 0px,
          #1b1e20 18px,
          #1f2326 18px,
          #1f2326 36px
        );
      min-height:100vh;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:40px 20px 60px;
    }

    .hero{
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(214,168,79,.07), rgba(214,168,79,0)),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)),
        var(--panel);
      border-radius:24px;
      padding:32px 28px;
      box-shadow:0 20px 40px rgba(0,0,0,.35);
      margin-bottom:28px;
      position:relative;
      overflow:hidden;
    }

    .hero:before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, transparent 0 2%, rgba(214,168,79,.09) 2% 2.4%, transparent 2.4% 100%),
        linear-gradient(0deg, transparent 0 94%, rgba(214,168,79,.08) 94% 95%, transparent 95% 100%);
      pointer-events:none;
      opacity:.45;
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(28px,4vw,48px);
      line-height:1.05;
      color:var(--gold);
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .sub{
      margin:0;
      color:var(--muted);
      max-width:850px;
      font-size:16px;
      line-height:1.5;
    }

    .grid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:22px;
      margin-top:22px;
    }

    @media (max-width: 900px){
      .grid{grid-template-columns:1fr}
    }

    .card{
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01)),
        var(--panel);
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 18px 32px rgba(0,0,0,.28);
    }

    .card-head{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      padding:20px 20px 14px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(214,168,79,.10), rgba(214,168,79,0)),
        var(--panel-2);
    }

    .card h2{
      margin:0 0 6px;
      font-size:28px;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .tag{
      display:inline-block;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      white-space:nowrap;
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-weight:700;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);
      white-space:nowrap;
    }

    .status.open{color:var(--good)}
    .status.closed{color:var(--bad)}
    .status.unknown{color:var(--warn)}

    .card-body{
      padding:20px;
    }

    .meta{
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
      margin-bottom:18px;
    }

    .meta-box{
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:16px;
      background:rgba(255,255,255,.025);
    }

    .meta-title{
      margin:0 0 8px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:var(--gold);
    }

    .meta-value{
      margin:0;
      color:var(--text);
      line-height:1.5;
      font-size:15px;
      word-break:break-word;
    }

    .hours{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      gap:10px;
    }

    .hours li{
      display:flex;
      justify-content:space-between;
      gap:16px;
      padding:11px 12px;
      border-radius:12px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      font-size:14px;
    }

    .hours .day{
      color:var(--gold);
      font-weight:700;
      min-width:95px;
    }

    .hours .time{
      color:var(--text);
      text-align:right;
    }

    .map-wrap{
      height:100%;
      min-height:520px;
      background:#151719;
    }

    .map-wrap iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:18px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 16px;
      border-radius:12px;
      border:1px solid rgba(214,168,79,.35);
      background:rgba(214,168,79,.08);
      color:var(--text);
      text-decoration:none;
      font-weight:700;
    }

    .btn:hover{
      background:rgba(214,168,79,.14);
    }

    .loading, .error{
      padding:16px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
    }

    .error{
      color:#ffb0b0;
      border-color:rgba(255,122,122,.25);
      background:rgba(255,122,122,.06);
    }

    footer{
      margin-top:22px;
      color:#9d978b;
      font-size:12px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Garage Trail Status</h1>
      <p class="sub">
        Live venue data for the trail. This panel is currently set up for The Piston Club and pulls its details at page load.
      </p>
    </section>

    <section class="grid">
      <article class="card">
        <div class="card-head">
          <div>
            <span class="tag">Engine Garage</span>
            <h2 id="venueName">The Piston Club</h2>
          </div>
          <div id="statusBadge" class="status unknown">Loading…</div>
        </div>

        <div class="card-body">
          <div id="content">
            <div class="loading">Loading live venue details…</div>
          </div>
        </div>
      </article>

      <aside class="card map-wrap">
        <iframe
          id="mapFrame"
          title="Venue map"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="about:blank"
        ></iframe>
      </aside>
    </section>

    <footer>
      Data may be supplied by Geoapify / OpenStreetMap contributors.
    </footer>
  </div>

  <script>
    const API_KEY = "e88278384cd740e3ae134e4f70adc197";
    const PLACE_ID = "51b6013275adb9fcbf5932b5fef5f6194a40f00102f9018a556d0c000000009203085468652053746167";

    const contentEl = document.getElementById("content");
    const statusBadge = document.getElementById("statusBadge");
    const venueNameEl = document.getElementById("venueName");
    const mapFrame = document.getElementById("mapFrame");

    function escapeHtml(str = "") {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function extractHours(data) {
      return (
        data?.properties?.opening_hours ||
        data?.properties?.details?.opening_hours ||
        data?.properties?.datasource?.raw?.opening_hours ||
        data?.properties?.datasource?.raw?.openingHours ||
        data?.properties?.formatted_opening_hours ||
        null
      );
    }

    function extractWebsite(data) {
      return (
        data?.properties?.website ||
        data?.properties?.details?.website ||
        data?.properties?.datasource?.raw?.website ||
        null
      );
    }

    function extractName(data) {
      return (
        data?.properties?.name ||
        data?.properties?.details?.name ||
        "The Piston Club"
      );
    }

    function extractAddress(data) {
      return (
        data?.properties?.formatted ||
        data?.properties?.address_line2 ||
        data?.properties?.address_line1 ||
        data?.properties?.details?.formatted ||
        data?.properties?.datasource?.raw?.formatted_address ||
        "Address unavailable"
      );
    }

    function extractLatLon(data) {
      const lat =
        data?.properties?.lat ??
        data?.geometry?.coordinates?.[1] ??
        null;

      const lon =
        data?.properties?.lon ??
        data?.geometry?.coordinates?.[0] ??
        null;

      return { lat, lon };
    }

    function extractOpenNow(data, hours) {
      if (typeof data?.properties?.open_now === "boolean") return data.properties.open_now;
      if (typeof data?.properties?.details?.open_now === "boolean") return data.properties.details.open_now;
      if (typeof data?.properties?.datasource?.raw?.open_now === "boolean") return data.properties.datasource.raw.open_now;
      if (hours && typeof hours.open_now === "boolean") return hours.open_now;
      return null;
    }

    function formatHours(hours) {
      if (!hours) {
        return `<div class="meta-box"><p class="meta-title">Opening Hours</p><p class="meta-value">Opening hours unavailable.</p></div>`;
      }

      if (Array.isArray(hours.weekday_text)) {
        return `
          <div class="meta-box">
            <p class="meta-title">Opening Hours</p>
            <ul class="hours">
              ${hours.weekday_text.map(line => {
                const parts = String(line).split(": ");
                const day = parts.shift() || "";
                const time = parts.join(": ") || "";
                return `<li><span class="day">${escapeHtml(day)}</span><span class="time">${escapeHtml(time)}</span></li>`;
              }).join("")}
            </ul>
          </div>
        `;
      }

      if (typeof hours === "string") {
        return `
          <div class="meta-box">
            <p class="meta-title">Opening Hours</p>
            <p class="meta-value">${escapeHtml(hours)}</p>
          </div>
        `;
      }

      if (Array.isArray(hours)) {
        return `
          <div class="meta-box">
            <p class="meta-title">Opening Hours</p>
            <ul class="hours">
              ${hours.map(item => `<li><span class="time">${escapeHtml(String(item))}</span></li>`).join("")}
            </ul>
          </div>
        `;
      }

      if (typeof hours === "object") {
        const entries = Object.entries(hours).filter(([k]) => k !== "open_now");
        if (entries.length) {
          return `
            <div class="meta-box">
              <p class="meta-title">Opening Hours</p>
              <ul class="hours">
                ${entries.map(([day, time]) => `
                  <li>
                    <span class="day">${escapeHtml(day)}</span>
                    <span class="time">${escapeHtml(String(time))}</span>
                  </li>
                `).join("")}
              </ul>
            </div>
          `;
        }
      }

      return `<div class="meta-box"><p class="meta-title">Opening Hours</p><p class="meta-value">Opening hours unavailable.</p></div>`;
    }

    function setStatus(openNow) {
      statusBadge.className = "status";
      if (openNow === true) {
        statusBadge.classList.add("open");
        statusBadge.textContent = "Open now";
      } else if (openNow === false) {
        statusBadge.classList.add("closed");
        statusBadge.textContent = "Closed now";
      } else {
        statusBadge.classList.add("unknown");
        statusBadge.textContent = "Status unavailable";
      }
    }

    function setMap(lat, lon, label) {
      if (lat == null || lon == null) {
        mapFrame.src = "about:blank";
        return;
      }

      const bbox = [
        (lon - 0.01).toFixed(6),
        (lat - 0.006).toFixed(6),
        (lon + 0.01).toFixed(6),
        (lat + 0.006).toFixed(6)
      ].join("%2C");

      mapFrame.src =
        `https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${lat}%2C${lon}`;
    }

    async function loadVenue() {
      try {
        const url = `https://api.geoapify.com/v2/place-details?id=${encodeURIComponent(PLACE_ID)}&features=details&apiKey=${encodeURIComponent(API_KEY)}`;
        const res = await fetch(url);

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const json = await res.json();
        const feature =
          json?.features?.[0] ||
          json?.feature ||
          json?.result ||
          null;

        if (!feature) {
          throw new Error("No venue data returned.");
        }

        const name = extractName(feature);
        const address = extractAddress(feature);
        const website = extractWebsite(feature);
        const hours = extractHours(feature);
        const openNow = extractOpenNow(feature, hours);
        const { lat, lon } = extractLatLon(feature);

        venueNameEl.textContent = name;
        setStatus(openNow);
        setMap(lat, lon, name);

        const osmLink = lat != null && lon != null
          ? `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=17/${lat}/${lon}`
          : "#";

        const googleLink = lat != null && lon != null
          ? `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`
          : "#";

        contentEl.innerHTML = `
          <div class="meta">
            <div class="meta-box">
              <p class="meta-title">Location</p>
              <p class="meta-value">${escapeHtml(address)}</p>
            </div>

            ${formatHours(hours)}

            <div class="meta-box">
              <p class="meta-title">Live Links</p>
              <div class="actions">
                ${website ? `<a class="btn" href="${escapeHtml(website)}" target="_blank" rel="noopener noreferrer">Venue Website</a>` : ""}
                ${lat != null && lon != null ? `<a class="btn" href="${googleLink}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a>` : ""}
                ${lat != null && lon != null ? `<a class="btn" href="${osmLink}" target="_blank" rel="noopener noreferrer">Open in OpenStreetMap</a>` : ""}
              </div>
            </div>
          </div>
        `;
      } catch (err) {
        setStatus(null);
        contentEl.innerHTML = `
          <div class="error">
            Failed to load live venue details.<br><br>
            ${escapeHtml(String(err.message || err))}
          </div>
        `;
      }
    }

    loadVenue();
  </script>
</body>
</html>
