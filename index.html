<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Piston Club | Trail Garage Status</title>

  <style>
    :root{
      --panel:#1c2023;
      --panel-2:#262c30;
      --line:#40484f;
      --gold:#d3a44d;
      --gold-soft:rgba(211,164,77,.14);
      --text:#f5f1e8;
      --muted:#b8b1a2;
      --open:#56d58a;
      --closed:#ff7d7d;
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
      min-height:100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(0,0,0,.35), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,0,0,.25), transparent 45%),
        linear-gradient(180deg, #0f1316 0%, #161b1f 100%),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.03) 0px,
          rgba(255,255,255,0.03) 2px,
          transparent 2px,
          transparent 120px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 1px,
          transparent 1px,
          transparent 4px
        );
    }

    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:34px 20px 60px;
      position:relative;
    }

    .wrap::after{
      content:"";
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      height:120px;
      pointer-events:none;
      opacity:.12;
      background:
        repeating-linear-gradient(
          45deg,
          #d3a44d 0px,
          #d3a44d 12px,
          #000 12px,
          #000 24px
        );
    }

    .hero{
      position:relative;
      overflow:hidden;
      margin-bottom:24px;
      padding:34px 30px;
      border-radius:28px;
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(211,164,77,.12), rgba(211,164,77,0)),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        var(--panel);
      box-shadow:var(--shadow);
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.35;
      background:
        linear-gradient(90deg, transparent 0 3%, rgba(211,164,77,.14) 3% 3.3%, transparent 3.3% 100%),
        linear-gradient(0deg, transparent 0 93%, rgba(211,164,77,.10) 93% 94%, transparent 94% 100%);
    }

    .eyebrow{
      position:relative;
      z-index:1;
      margin:0 0 10px;
      color:var(--gold);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.18em;
    }

    h1{
      position:relative;
      z-index:1;
      margin:0 0 10px;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.05em;
      font-size:clamp(30px,4vw,56px);
      line-height:1.02;
    }

    .sub{
      position:relative;
      z-index:1;
      margin:0;
      color:var(--muted);
      max-width:860px;
      line-height:1.55;
      font-size:16px;
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:var(--radius);
      border:1px solid #4b535a;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.008)),
        linear-gradient(135deg, rgba(211,164,77,.05), rgba(0,0,0,0) 30%),
        linear-gradient(180deg, #20262a 0%, #1a1f23 100%);
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255,255,255,.05),
        inset 0 -1px 0 rgba(0,0,0,.35);
    }

    .card-head{
      position:relative;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      padding:22px 22px 16px 22px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(211,164,77,.16), rgba(211,164,77,0)),
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)),
        var(--panel-2);
    }

    .card-head::before,
    .card-head::after{
      content:"";
      position:absolute;
      top:14px;
      width:10px;
      height:10px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 35%, #9aa3aa 0 20%, #5d666d 21% 55%, #2a3035 56% 100%);
      box-shadow:
        0 0 0 1px rgba(0,0,0,.35),
        inset 0 1px 1px rgba(255,255,255,.15);
    }

    .card-head::before{ left:14px; }
    .card-head::after{ right:14px; }

    .label{
      display:inline-block;
      margin-bottom:8px;
      padding:7px 11px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
      color:#c2bbb0;
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:12px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    .venue-title{
      margin:0;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.05em;
      line-height:1.05;
      font-size:28px;
      text-shadow:
        0 0 10px rgba(211,164,77,.08),
        0 1px 0 rgba(0,0,0,.4);
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:9px;
      white-space:nowrap;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      font-weight:700;
      font-size:14px;
    }

    .status.open{color:var(--open)}
    .status.closed{color:var(--closed)}

    .content{
      padding:22px;
    }

    .venue-layout{
      display:grid;
      grid-template-columns:1fr 460px;
      gap:22px;
      align-items:center;
    }

    @media (max-width: 1100px){
      .venue-layout{
        grid-template-columns:1fr;
      }
    }

    .info-column{
      min-width:0;
      position:relative;
    }

    .info-column::before{
      content:"ENGINE BAY STATUS";
      display:block;
      margin-bottom:14px;
      color:rgba(211,164,77,.22);
      font-size:34px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      line-height:1;
      pointer-events:none;
      user-select:none;
    }

    .map-column{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100%;
    }

    .map-frame-wrap{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:640px;
    }

    #mapFrame{
      width:100%;
      height:640px;
      border:0;
      display:block;
      background:#101214;
      border-radius:18px;
      overflow:hidden;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        0 8px 24px rgba(0,0,0,.28);
    }

    .section{
      position:relative;
      margin-bottom:18px;
      padding:16px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(90deg, rgba(255,255,255,.025), rgba(255,255,255,.01)),
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.02));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        inset 0 -1px 0 rgba(0,0,0,.18);
    }

    .section::before,
    .section::after{
      content:"";
      position:absolute;
      top:12px;
      width:8px;
      height:8px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 35%, #9aa3aa 0 20%, #5d666d 21% 55%, #2a3035 56% 100%);
      box-shadow:
        0 0 0 1px rgba(0,0,0,.35),
        inset 0 1px 1px rgba(255,255,255,.12);
      opacity:.95;
    }

    .section::before{ left:12px; }
    .section::after{ right:12px; }

    .section:last-child{margin-bottom:0}

    .section-title{
      margin:0 0 10px;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:12px;
      padding-left:0;
    }

    .section-body{
      margin:0;
      color:var(--text);
      font-size:15px;
      line-height:1.6;
    }

    .hours{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      gap:10px;
    }

    .hours li{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.07);
      background:
        linear-gradient(90deg, rgba(255,255,255,.03), rgba(255,255,255,.012)),
        linear-gradient(180deg, rgba(0,0,0,.06), rgba(0,0,0,.02));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.025),
        inset 0 -1px 0 rgba(0,0,0,.18);
    }

    .day{
      min-width:110px;
      color:var(--gold);
      font-weight:700;
    }

    .time{
      flex:1;
      text-align:right;
    }

    .food{
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:12px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 16px;
      border-radius:12px;
      text-decoration:none;
      font-weight:700;
      color:var(--text);
      border:1px solid rgba(211,164,77,.35);
      background:
        linear-gradient(180deg, rgba(211,164,77,.16), rgba(211,164,77,.08));
      transition:.15s ease;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 1px 0 rgba(0,0,0,.25);
    }

    .btn:hover{
      background:
        linear-gradient(180deg, rgba(211,164,77,.24), rgba(211,164,77,.12));
      transform:translateY(-1px);
    }

    .loading,
    .error{
      padding:16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      line-height:1.5;
    }

    .error{
      color:#ffb0b0;
      border-color:rgba(255,125,125,.28);
      background:rgba(255,125,125,.06);
    }

    footer{
      margin-top:18px;
      text-align:center;
      color:#978f81;
      font-size:12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <p class="eyebrow">Trail Garage Status</p>
      <h1>The Piston Club</h1>
      <p class="sub">
        Live venue panel pulling the public opening-times and footer contact information directly from the Piston Club homepage text.
      </p>
    </section>

    <article class="card">
      <div class="card-head">
        <div>
          <span class="label">Engine Garage</span>
          <h2 class="venue-title" id="venueName">The Piston Club</h2>
        </div>
        <div class="status closed" id="statusBadge">Checking…</div>
      </div>

      <div class="content">
        <div class="venue-layout">
          <div class="info-column" id="contentArea">
            <div class="loading">Loading live website details…</div>
          </div>

          <div class="map-column">
            <div class="map-frame-wrap">
              <iframe
                id="mapFrame"
                title="The Piston Club map"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                src="about:blank"
              ></iframe>
            </div>
          </div>
        </div>
      </div>
    </article>

    <footer>
      Live page source: thepistonclub.co.uk
    </footer>
  </div>

  <script>
    const API_KEY = "e88278384cd740e3ae134e4f70adc197";
    const PLACE_ID = "51b6013275adb9fcbf5932b5fef5f6194a40f00102f9018a556d0c000000009203085468652053746167";

    const SOURCE_URL = "https://thepistonclub.co.uk/";
    const FETCH_URL = "https://r.jina.ai/http://thepistonclub.co.uk/";
    const MAPS_QUERY = "The Piston Club at The Stag, Alcester Road, Redhill, Stratford-upon-Avon, Warwickshire, B49 6NQ";

    const contentArea = document.getElementById("contentArea");
    const statusBadge = document.getElementById("statusBadge");
    const venueName = document.getElementById("venueName");
    const mapFrame = document.getElementById("mapFrame");

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normaliseSpaces(str = "") {
      return str
        .replace(/\u00A0/g, " ")
        .replace(/[ \t]+/g, " ")
        .trim();
    }

    function cleanTimeText(str = "") {
      return normaliseSpaces(
        String(str)
          .replace(/^\*+\s*/g, "")
          .replace(/\s*\*+\s*/g, " ")
      );
    }

    function parsePistonClubText(text) {
      const cleaned = text.replace(/\r/g, "");

      const openingBlockMatch = cleaned.match(
        /Opening Times[\s\S]*?Monday to Saturday:\s*([^\n]+)\n\((Food[^\n]+)\)[\s\S]*?Sunday:\s*([^\n]+)\n\((Food[^\n]+)\)/i
      );

      let monSat = "";
      let monSatFood = "";
      let sunday = "";
      let sundayFood = "";

      if (openingBlockMatch) {
        monSat = cleanTimeText(openingBlockMatch[1]);
        monSatFood = cleanTimeText(openingBlockMatch[2]);
        sunday = cleanTimeText(openingBlockMatch[3]);
        sundayFood = cleanTimeText(openingBlockMatch[4]);
      } else {
        const mondayMatch = cleaned.match(/Monday to Saturday:\s*([^\n]+)/i);
        const mondayFoodMatch = cleaned.match(/Monday to Saturday:[^\n]*\n\((Food[^\n]+)\)/i);
        const sundayMatch = cleaned.match(/Sunday:\s*([^\n]+)/i);
        const sundayFoodMatch = cleaned.match(/Sunday:[^\n]*\n\((Food[^\n]+)\)/i);

        monSat = mondayMatch ? cleanTimeText(mondayMatch[1]) : "";
        monSatFood = mondayFoodMatch ? cleanTimeText(mondayFoodMatch[1]) : "";
        sunday = sundayMatch ? cleanTimeText(sundayMatch[1]) : "";
        sundayFood = sundayFoodMatch ? cleanTimeText(sundayFoodMatch[1]) : "";
      }

      const footerMatch = cleaned.match(
        /\* The Piston Club\s*\n@\s*The Stag\s*\n([^\n]+)\n([^\n]+)\n([^\n]+)\n([^\n]+)\n([^\n]+)\s*\n\s*\*\s*([0-9 ]+)\s*\n\s*\*\s*([^\n]+)/i
      );

      let addressLines = [
        "The Piston Club at The Stag",
        "Alcester Road",
        "Redhill",
        "Stratford upon Avon",
        "Warwickshire",
        "B49 6NQ"
      ];
      let phone = "01789 764634";
      let email = "info@thepistonclub.co.uk";

      if (footerMatch) {
        addressLines = [
          "The Piston Club at The Stag",
          normaliseSpaces(footerMatch[1]),
          normaliseSpaces(footerMatch[2]),
          normaliseSpaces(footerMatch[3]),
          normaliseSpaces(footerMatch[4]),
          normaliseSpaces(footerMatch[5])
        ];
        phone = normaliseSpaces(footerMatch[6]).replace(/^\*+\s*/g, "");
        email = normaliseSpaces(footerMatch[7]).replace(/^\*+\s*/g, "");
      }

      return {
        name: "The Piston Club",
        addressLines,
        phone,
        email,
        website: SOURCE_URL,
        hours: {
          monSat,
          monSatFood,
          sunday,
          sundayFood
        }
      };
    }

    function todayHours(data) {
      const now = new Date();
      const ukDay = now.toLocaleString("en-GB", {
        weekday: "long",
        timeZone: "Europe/London"
      });

      if (ukDay === "Sunday") {
        return {
          label: "Today",
          venue: data.hours.sunday,
          food: data.hours.sundayFood
        };
      }

      return {
        label: "Today",
        venue: data.hours.monSat,
        food: data.hours.monSatFood
      };
    }

    function parseTimeRange(range) {
      if (!range) return null;

      const cleaned = String(range)
        .replace(/^food:?\s*/i, "")
        .replace(/[–—]/g, "-")
        .replace(/\s+/g, "")
        .toLowerCase();

      const parts = cleaned.split("-");
      if (parts.length !== 2) return null;

      function toMinutes(value) {
        const match =
          value.match(/^(\d{1,2})(?::|\.)(\d{2})(am|pm)$/) ||
          value.match(/^(\d{1,2})(am|pm)$/);

        if (!match) return null;

        let hour;
        let mins;
        let meridian;

        if (match.length === 4) {
          hour = parseInt(match[1], 10);
          mins = parseInt(match[2], 10);
          meridian = match[3];
        } else {
          hour = parseInt(match[1], 10);
          mins = 0;
          meridian = match[2];
        }

        if (meridian === "am") {
          if (hour === 12) hour = 0;
        } else {
          if (hour !== 12) hour += 12;
        }

        return hour * 60 + mins;
      }

      const start = toMinutes(parts[0]);
      const end = toMinutes(parts[1]);

      if (start == null || end == null) return null;
      return { start, end };
    }

    function computeOpenStatus(data) {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        weekday: "long",
        hour12: false,
        timeZone: "Europe/London"
      }).formatToParts(now);

      const hour = parseInt(parts.find(p => p.type === "hour")?.value || "0", 10);
      const minute = parseInt(parts.find(p => p.type === "minute")?.value || "0", 10);
      const weekday = parts.find(p => p.type === "weekday")?.value || "";
      const minsNow = hour * 60 + minute;

      const venueRange = weekday === "Sunday"
        ? parseTimeRange(data.hours.sunday)
        : parseTimeRange(data.hours.monSat);

      const foodRange = weekday === "Sunday"
        ? parseTimeRange(data.hours.sundayFood)
        : parseTimeRange(data.hours.monSatFood);

      const venueOpen = venueRange ? minsNow >= venueRange.start && minsNow <= venueRange.end : false;
      const foodOpen = foodRange ? minsNow >= foodRange.start && minsNow <= foodRange.end : false;

      return { venueOpen, foodOpen };
    }

    async function renderMap() {
      try {
        const placeDetailsUrl = `https://api.geoapify.com/v2/place-details?id=${encodeURIComponent(PLACE_ID)}&features=details&apiKey=${encodeURIComponent(API_KEY)}`;
        const res = await fetch(placeDetailsUrl, { cache: "no-store" });

        if (!res.ok) throw new Error("Place details failed");

        const data = await res.json();
        const feature = data?.features?.[0];

        if (!feature) throw new Error("No place details result");

        let lon = feature?.geometry?.coordinates?.[0];
        let lat = feature?.geometry?.coordinates?.[1];

        if ((lat == null || lon == null) && feature?.properties) {
          lat = feature.properties.lat;
          lon = feature.properties.lon;
        }

        lat = parseFloat(lat);
        lon = parseFloat(lon);

        if (Number.isNaN(lat) || Number.isNaN(lon)) {
          throw new Error("Invalid coordinates");
        }

        const bbox = [
          lon - 0.01,
          lat - 0.006,
          lon + 0.01,
          lat + 0.006
        ].map(v => v.toFixed(6)).join("%2C");

        mapFrame.src = `https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${lat}%2C${lon}`;
      } catch {
        mapFrame.src = `https://www.openstreetmap.org/export/embed.html?bbox=-1.744600%2C52.208900%2C-1.724600%2C52.220900&layer=mapnik&marker=52.214900%2C-1.734600`;
      }
    }

    function render(data) {
      const current = todayHours(data);
      const status = computeOpenStatus(data);
      const addressHtml = data.addressLines.map(line => escapeHtml(line)).join("<br>");
      const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(MAPS_QUERY)}`;

      venueName.textContent = data.name;

      statusBadge.className = `status ${status.venueOpen ? "open" : "closed"}`;
      statusBadge.textContent = status.venueOpen ? "Open now" : "Closed now";

      contentArea.innerHTML = `
        <div class="section">
          <p class="section-title">Current Status</p>
          <p class="section-body">
            <strong>${status.venueOpen ? "Venue is currently open." : "Venue is currently closed."}</strong>
            <br>
            ${escapeHtml(current.label)} hours: ${escapeHtml(current.venue || "Unavailable")}
            ${current.food ? `<br><span style="color:var(--muted)">Food: ${escapeHtml(current.food.replace(/^Food:?\s*/i, ""))}</span>` : ""}
            <br>
            <span style="color:${status.foodOpen ? "var(--open)" : "var(--muted)"}">
              ${status.foodOpen ? "Food service appears to be open now." : "Food service appears to be closed now."}
            </span>
          </p>
        </div>

        <div class="section">
          <p class="section-title">Opening Hours</p>
          <ul class="hours">
            <li>
              <span class="day">Mon to Sat</span>
              <span class="time">
                ${escapeHtml(data.hours.monSat || "Unavailable")}
                ${data.hours.monSatFood ? `<span class="food">${escapeHtml(data.hours.monSatFood)}</span>` : ""}
              </span>
            </li>
            <li>
              <span class="day">Sunday</span>
              <span class="time">
                ${escapeHtml(data.hours.sunday || "Unavailable")}
                ${data.hours.sundayFood ? `<span class="food">${escapeHtml(data.hours.sundayFood)}</span>` : ""}
              </span>
            </li>
          </ul>
        </div>

        <div class="section">
          <p class="section-title">Location</p>
          <p class="section-body">${addressHtml}</p>
        </div>

        <div class="section">
          <p class="section-title">Contact</p>
          <p class="section-body">
            ${escapeHtml(data.phone)}<br>
            <a href="mailto:${escapeHtml(data.email)}" style="color:var(--gold); text-decoration:none;">${escapeHtml(data.email)}</a>
          </p>
          <div class="actions">
            <a class="btn" href="${escapeHtml(data.website)}" target="_blank" rel="noopener noreferrer">Venue Website</a>
            <a class="btn" href="${escapeHtml(mapsLink)}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a>
          </div>
        </div>
      `;

      renderMap();
    }

    async function loadLiveData() {
      try {
        const res = await fetch(FETCH_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const text = await res.text();
        const parsed = parsePistonClubText(text);

        if (!parsed.hours.monSat && !parsed.hours.sunday) {
          throw new Error("Opening hours not found on source page.");
        }

        localStorage.setItem("pistonClubLiveData", JSON.stringify(parsed));
        render(parsed);
      } catch {
        const cached = localStorage.getItem("pistonClubLiveData");
        if (cached) {
          render(JSON.parse(cached));
        } else {
          contentArea.innerHTML = `
            <div class="error">
              Failed to load the live website data.
            </div>
          `;
          statusBadge.className = "status closed";
          statusBadge.textContent = "Unavailable";
          renderMap();
        }
      }
    }

    loadLiveData();
  </script>
</body>
</html>
